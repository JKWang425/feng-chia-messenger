# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - WebFinalProject

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Build Frontend
        run: |
          cd client
          npm install
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/client/dist
          cp -r client/dist/* deploy/client/dist/
          cp -r server/* deploy/
          rm -rf deploy/node_modules
          cp package.json deploy/
          cd deploy
          zip -r ../release.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FAC155B584DB49A9BC9ED0C5D4B50E14 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1033AF582B74469E8298A9F29E46666F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4164EA7A33E84060ABBB2E4488971CDD }}

      - name: Configure Azure App Settings
        run: |
          az webapp config appsettings set --name WebFinalProject --resource-group webfinalproject_group --settings \
            SCM_DO_BUILD_DURING_DEPLOYMENT=true \
            WEBSITE_NODE_DEFAULT_VERSION="~22"

      - name: Start the web app
        run: az webapp start --name WebFinalProject --resource-group webfinalproject_group

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'WebFinalProject'
          slot-name: 'Production'
          package: release.zip
          startup-command: 'node index.js'
